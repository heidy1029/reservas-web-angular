<div class="er-shell">
<div
  class="er-sidebar-backdrop"
  [class.show]="sidebarOpen"
  (click)="closeSidebar()">
</div>

<aside class="er-sidebar" [class.open]="sidebarOpen">
    <div class="er-brand">
      <img src="../images/Logo.png" alt="ElectroReserve" class="er-logo">

      <div>
        <div class="er-brand-title">ElectroReserve</div>
        <div class="er-brand-subtitle">Vacation Platform</div>
      </div>
    </div>

    <div class="er-menu-section">Operación</div>

    <nav class="er-menu">

      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeSidebar()">
        <i class="fa-solid fa-chart-pie"></i>
        <span>Dashboard</span>
      </a>

      <a routerLink="/reservas" routerLinkActive="active" (click)="closeSidebar()">
        <i class="fa-solid fa-calendar-check"></i>
        <span>Reservas</span>
      </a>

    </nav>

    <div class="er-menu-section">Catálogos</div>

    <nav class="er-menu">

      <a routerLink="/sitios" routerLinkActive="active" (click)="closeSidebar()">
        <i class="fa-solid fa-location-dot"></i>
        <span>Sitios</span>
      </a>

      <a routerLink="/alojamientos" routerLinkActive="active" (click)="closeSidebar()">
        <i class="fa-solid fa-bed"></i>
        <span>Alojamientos</span>
      </a>

    </nav>

    <div class="er-menu-section">Configuración</div>

    <nav class="er-menu">

      <a routerLink="/tarifas" routerLinkActive="active" (click)="closeSidebar()">
        <i class="fa-solid fa-money-bill-wave"></i>
        <span>Tarifas</span>
      </a>

      <a routerLink="/temporadas" routerLinkActive="active" (click)="closeSidebar()">
        <i class="fa-solid fa-calendar-days"></i>
        <span>Temporadas</span>
      </a>

     <a routerLink="/usuarios" routerLinkActive="active" (click)="closeSidebar()">
  <i class="fa-solid fa-users"></i>
  <span>Usuarios</span>
</a>

      <a routerLink="/reportes" routerLinkActive="active" (click)="closeSidebar()">
  <i class="fa-solid fa-chart-line"></i>
  <span>Reportes</span>
</a>

      <a routerLink="/configuracion" routerLinkActive="active" (click)="closeSidebar()">
  <i class="fa-solid fa-gear"></i>
  <span>Configuración</span>
</a>

    </nav>

    <button class="er-logout" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Cerrar sesión</span>
    </button>

  </aside>
 

  <section class="er-main">

    <header class="er-topbar">

<button class="er-mobile-menu-btn" (click)="toggleSidebar()">
  <i class="fa-solid fa-bars"></i>
</button>

      <div class="er-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Buscar reservas, huéspedes, sitios..." />
      </div>

      <div class="er-topbar-actions">
        <button class="er-icon-btn">
          <i class="fa-regular fa-bell"></i>
        </button>

        <button class="er-icon-btn">
          <i class="fa-regular fa-moon"></i>
        </button>

        <div class="er-user">
          <div class="er-user-info">
            <strong>Admin User</strong>
            <small>Manager</small>
          </div>

          <div class="er-avatar">A</div>
        </div>
      </div>

    </header>

    <main class="er-content er-fade-in">
      <router-outlet></router-outlet>
    </main>

  </section>
<app-toast></app-toast>
<app-confirm-dialog></app-confirm-dialog>
<app-loading></app-loading>
</div>
